<style>
  :root {
    /* Matched to main site shared.css */
    --bg: #F5F0E7;
    --ink: #111110;
    --ink-70: rgba(17,17,16,.70);
    --ink-45: rgba(17,17,16,.45);
    --ink-25: rgba(17,17,16,.25);
    --ink-mid: #5E4634;
    --ink-soft: #8A6E52;
    --hair: rgba(17,17,16,0.14);
    --hair-soft: rgba(17,17,16,0.08);
    --sans: 'Plus Jakarta Sans', 'DM Sans', Helvetica, sans-serif;
    --serif: 'Cormorant Garamond', Georgia, serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    font-weight: 300;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(17,17,16,0.4) 0.4px, transparent 0.6px);
    background-size: 3px 3px;
    opacity: 0.035;
    pointer-events: none;
    z-index: 100;
    mix-blend-mode: multiply;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 0%, rgba(232, 184, 157, 0.04) 60%, rgba(200, 168, 130, 0.06) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    min-height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 32px 48px;
  }

  /* — HEADER — */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    opacity: 0;
    animation: fadeIn 1.4s ease-out 0.2s forwards;
  }

  .meta {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .meta .dot {
    display: inline-block;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--ink-soft);
    margin: 0 10px;
    vertical-align: middle;
    opacity: 0.7;
  }

  /* — LOGO — matches shared.css .logo-st exactly — */
  .logo-st {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 0.88;
    letter-spacing: -0.015em;
    font-family: var(--sans);
    font-weight: 600;
    color: var(--ink);
    font-synthesis: none;
  }
  .logo-st .l1 { display: block; }
  .logo-st .l2 { display: block; margin-left: 0.6em; }

  /* Display size — same proportional rules, scaled up */
  .logo-st--display {
    font-size: clamp(4.5rem, 12vw, 10rem);
    opacity: 0;
    animation: riseIn 1.6s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
  }

  /* — STAGE — */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 0;
  }

  .stage-inner {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    line-height: 1.4;
    color: var(--ink-mid);
    letter-spacing: 0.005em;
    opacity: 0;
    animation: fadeIn 1.6s ease-out 1.1s forwards;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--ink-soft);
    opacity: 0;
    animation: expandDivider 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
    transform-origin: center;
  }

  /* — FOOTER — */
  footer {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: flex-end;
    opacity: 0;
    animation: fadeIn 1.4s ease-out 1.4s forwards;
  }

  .footer-right {
    text-align: right;
  }

  .footer-left,
  .footer-right {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }

  /* — SOCIAL ICONS — */
  .footer-socials {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .social-link {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid rgba(17,17,16,.18);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: border-color .2s, opacity .2s;
    opacity: .7;
  }

  .social-link:hover {
    border-color: rgba(17,17,16,.45);
    opacity: 1;
  }

  /* — ANIMATIONS — */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes expandDivider {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 0.8; transform: scaleX(1); }
  }

  /* — RESPONSIVE — */
  @media (max-width: 720px) {
    .page { padding: 24px 24px; }

    header {
      flex-direction: column;
      gap: 8px;
    }

    footer {
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: flex-start;
    }

    .footer-right {
      text-align: left;
    }

    .logo-st--display {
      font-size: clamp(3.4rem, 18vw, 6rem);
    }

    .tagline {
      font-size: 1.05rem;
      padding: 0 16px;
    }

    .meta,
    .footer-left,
    .footer-right {
      font-size: 9px;
      letter-spacing: 0.2em;
    }

    .stage-inner { gap: 24px; }
  }

  @media (max-height: 640px) {
    .stage-inner { gap: 18px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-delay: 0ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
